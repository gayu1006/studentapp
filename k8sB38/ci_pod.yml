 apiVersion:  v1 
 kind: Pod
 metadata:
   name: nginxci-pod
   lables:
     app: nginxci
spec:
    containers:
          - image: nginx:latest
              ports:
             -containerPort: 80
             name: nginxcont  
---
apiVersion:  v1   
kind: Service
metadata:
  name: clusteripsvc
spec:
    selector:
         app: nginxci
    type: ClusterIp
    ports:
         - protocol: TCP
           port: 80 #pod port
           targetPort: 80 #container port